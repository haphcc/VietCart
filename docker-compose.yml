services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./backend/api-gateway/.env.example
    environment:
      PRODUCT_SERVICE_URL: http://product-service:3001
      CART_SERVICE_URL: http://cart-lb:3002
      ORDER_SERVICE_URL: http://order-service:3003
      PAYMENT_SERVICE_URL: http://payment-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      USER_SERVICE_URL: http://user-service:3006
    depends_on:
      - cart-lb

  product-service:
    build:
      context: ./backend
      dockerfile: product-service/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./backend/product-service/.env.example
    environment:
      DB_HOST: host.docker.internal

  cart-lb:
    image: nginx:1.27-alpine
    ports:
      - "3002:3002"
    volumes:
      - ./backend/cart-lb/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cart-service-1
      - cart-service-2
      - cart-service-3

  cart-service-1:
    build:
      context: ./backend
      dockerfile: cart-service/Dockerfile
    env_file:
      - ./backend/cart-service/.env.example
    environment:
      DB_HOST: host.docker.internal
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  cart-service-2:
    build:
      context: ./backend
      dockerfile: cart-service/Dockerfile
    env_file:
      - ./backend/cart-service/.env.example
    environment:
      DB_HOST: host.docker.internal
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  cart-service-3:
    build:
      context: ./backend
      dockerfile: cart-service/Dockerfile
    env_file:
      - ./backend/cart-service/.env.example
    environment:
      DB_HOST: host.docker.internal
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  order-service:
    build:
      context: ./backend
      dockerfile: order-service/Dockerfile
    ports:
      - "3003:3003"
    env_file:
      - ./backend/order-service/.env.example
    environment:
      DB_HOST: host.docker.internal
      PRODUCT_SERVICE_URL: http://product-service:3001
      CART_SERVICE_URL: http://cart-lb:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      USER_SERVICE_URL: http://user-service:3006
    depends_on:
      - cart-lb

  payment-service:
    build:
      context: ./backend
      dockerfile: payment-service/Dockerfile
    ports:
      - "3004:3004"
    env_file:
      - ./backend/payment-service/.env.example
    environment:
      DB_HOST: host.docker.internal
      ORDER_SERVICE_URL: http://order-service:3003

  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    ports:
      - "3005:3005"
    env_file:
      - ./backend/notification-service/.env.example
    environment:
      DB_HOST: host.docker.internal

  user-service:
    build:
      context: ./backend
      dockerfile: user-service/Dockerfile
    ports:
      - "3006:3006"
    env_file:
      - ./backend/user-service/.env.example
    environment:
      DB_HOST: host.docker.internal
      NOTIFICATION_SERVICE_URL: http://notification-service:3005

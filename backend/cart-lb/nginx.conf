events {}

http {
  upstream cart_service_pool {
    server cart-service-1:3002;
    server cart-service-2:3002;
    server cart-service-3:3002;
  }

  server {
    listen 3002;

    location /health {
      proxy_pass http://cart_service_pool;
    }

    location / {
      proxy_pass http://cart_service_pool;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
